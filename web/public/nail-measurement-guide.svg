<svg viewBox="0 0 880 330" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="880" height="330" fill="#fcf9f5"/>

  <!-- Header -->
  <text x="440" y="26" text-anchor="middle"
    font-family="Georgia, serif" font-size="11" letter-spacing="3.5"
    fill="#5c6149">ARTISANAL BOUTIQUE PRESS-ON NAILS</text>
  <text x="440" y="62" text-anchor="middle"
    font-family="Georgia, serif" font-size="27" fill="#282c1b"
    >Measure the width of the nail surface.</text>

  <!-- ═══════════════════════════════════════════════════════════
       STEP 1  –  cx=110, cy=178
       ═══════════════════════════════════════════════════════════ -->
  <circle cx="110" cy="178" r="68" fill="#dee3c4"/>
  <g transform="translate(110,178)" fill="none" stroke="#3e4230" stroke-linecap="round">

    <!-- Palm base -->
    <rect x="-27" y="-8" width="54" height="24" rx="7"
          fill="#f6f3ef" stroke-width="1.6"/>

    <!-- Index finger -->
    <rect x="-23" y="-52" width="11" height="46" rx="5"
          fill="#f6f3ef" stroke-width="1.6"/>
    <!-- Middle finger -->
    <rect x="-9"  y="-56" width="11" height="50" rx="5"
          fill="#f6f3ef" stroke-width="1.6"/>
    <!-- Ring finger -->
    <rect x="5"   y="-52" width="11" height="46" rx="5"
          fill="#f6f3ef" stroke-width="1.6"/>
    <!-- Pinky -->
    <rect x="19"  y="-43" width="9"  height="37" rx="4"
          fill="#f6f3ef" stroke-width="1.6"/>

    <!-- Nail plates (small ovals on fingertips) -->
    <ellipse cx="-17.5" cy="-48" rx="4.5" ry="3" fill="#dee3c4" stroke-width="1"/>
    <ellipse cx="-3.5"  cy="-52" rx="4.5" ry="3" fill="#dee3c4" stroke-width="1"/>
    <ellipse cx="10.5"  cy="-48" rx="4.5" ry="3" fill="#dee3c4" stroke-width="1"/>
    <ellipse cx="23.5"  cy="-39" rx="4"   ry="2.5" fill="#dee3c4" stroke-width="1"/>

    <!-- Tape strip across fingers (dashed to look like tape) -->
    <rect x="-30" y="-33" width="62" height="10" rx="1"
          fill="rgba(255,255,255,0.65)" stroke-width="1.6"
          stroke-dasharray="5,2.5"/>
  </g>

  <text x="110" y="264" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="9" font-weight="700"
    letter-spacing="2.5" fill="#5c6149">STEP ONE</text>
  <text x="110" y="280" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="10.5" fill="#46473f"
    >Place a strip of tape over</text>
  <text x="110" y="294" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="10.5" fill="#46473f"
    >your natural nail plate</text>
  <text x="110" y="315" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="12" font-weight="600"
    fill="#282c1b"># 1</text>


  <!-- ═══════════════════════════════════════════════════════════
       STEP 2  –  cx=330, cy=178
       ═══════════════════════════════════════════════════════════ -->
  <circle cx="330" cy="178" r="68" fill="#dee3c4"/>
  <g transform="translate(330,178)" fill="none" stroke="#3e4230" stroke-linecap="round">

    <!-- Palm -->
    <rect x="-27" y="-8" width="54" height="24" rx="7"
          fill="#f6f3ef" stroke-width="1.6"/>
    <!-- Fingers -->
    <rect x="-23" y="-52" width="11" height="46" rx="5" fill="#f6f3ef" stroke-width="1.6"/>
    <rect x="-9"  y="-56" width="11" height="50" rx="5" fill="#f6f3ef" stroke-width="1.6"/>
    <rect x="5"   y="-52" width="11" height="46" rx="5" fill="#f6f3ef" stroke-width="1.6"/>
    <rect x="19"  y="-43" width="9"  height="37" rx="4" fill="#f6f3ef" stroke-width="1.6"/>
    <!-- Nail plates -->
    <ellipse cx="-17.5" cy="-48" rx="4.5" ry="3" fill="#dee3c4" stroke-width="1"/>
    <ellipse cx="-3.5"  cy="-52" rx="4.5" ry="3" fill="#dee3c4" stroke-width="1"/>
    <ellipse cx="10.5"  cy="-48" rx="4.5" ry="3" fill="#dee3c4" stroke-width="1"/>
    <ellipse cx="23.5"  cy="-39" rx="4"   ry="2.5" fill="#dee3c4" stroke-width="1"/>

    <!-- Tape strip (solid, already applied) -->
    <rect x="-30" y="-33" width="62" height="10" rx="1"
          fill="rgba(255,255,255,0.70)" stroke-width="1.6"/>

    <!-- Sidewall crease dots (the marks being made) -->
    <circle cx="-29" cy="-28" r="2.8" fill="#3e4230" stroke="none"/>
    <circle cx="29"  cy="-28" r="2.8" fill="#3e4230" stroke="none"/>

    <!-- Pen / marker  -->
    <g transform="translate(42,-44) rotate(-42)">
      <rect x="-3.5" y="-17" width="7" height="23" rx="2"
            fill="#282c1b" stroke="none"/>
      <polygon points="-3.5,6 3.5,6 0,15"
               fill="#282c1b" stroke="none"/>
      <!-- Pen clip -->
      <rect x="1" y="-16" width="2" height="12" rx="1"
            fill="#5c6149" stroke="none"/>
    </g>
  </g>

  <text x="330" y="264" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="9" font-weight="700"
    letter-spacing="2.5" fill="#5c6149">STEP TWO</text>
  <text x="330" y="280" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="10.5" fill="#46473f"
    >Use a pen to mark the left</text>
  <text x="330" y="294" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="10.5" fill="#46473f"
    >and right sidewall creases</text>
  <text x="330" y="315" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="12" font-weight="600"
    fill="#282c1b"># 2</text>


  <!-- ═══════════════════════════════════════════════════════════
       STEP 3  –  cx=550, cy=178
       ═══════════════════════════════════════════════════════════ -->
  <circle cx="550" cy="178" r="68" fill="#dee3c4"/>
  <g transform="translate(550,178)">

    <!-- Tape strip flat on its own (removed from finger context) -->
    <rect x="-52" y="-14" width="104" height="11" rx="1.5"
          fill="rgba(255,255,255,0.75)" stroke="#3e4230" stroke-width="1.5"/>

    <!-- Two ink dots on the tape -->
    <circle cx="-28" cy="-8.5" r="2.8" fill="#3e4230"/>
    <circle cx="28"  cy="-8.5" r="2.8" fill="#3e4230"/>

    <!-- Measurement span arrows -->
    <line x1="-28" y1="-24" x2="28" y2="-24"
          stroke="#3e4230" stroke-width="1.3"/>
    <!-- Arrow caps (manual, simple lines) -->
    <polyline points="-22,-29 -28,-24 -22,-19"
              fill="none" stroke="#3e4230" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="22,-29 28,-24 22,-19"
              fill="none" stroke="#3e4230" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Label above -->
    <text x="0" y="-33" text-anchor="middle"
      font-family="Georgia, serif" font-size="9" font-style="italic"
      fill="#282c1b">Middle Finger = 13 mm</text>

    <!-- Ruler body -->
    <rect x="-52" y="1" width="104" height="20" rx="2"
          fill="rgba(255,255,255,0.88)" stroke="#3e4230" stroke-width="1.5"/>

    <!-- Major ticks every 16px (= 5 mm spacing) -->
    <line x1="-48" y1="1" x2="-48" y2="10" stroke="#3e4230" stroke-width="1"/>
    <line x1="-32" y1="1" x2="-32" y2="10" stroke="#3e4230" stroke-width="1"/>
    <line x1="-16" y1="1" x2="-16" y2="10" stroke="#3e4230" stroke-width="1"/>
    <line x1="0"   y1="1" x2="0"   y2="10" stroke="#3e4230" stroke-width="1"/>
    <line x1="16"  y1="1" x2="16"  y2="10" stroke="#3e4230" stroke-width="1"/>
    <line x1="32"  y1="1" x2="32"  y2="10" stroke="#3e4230" stroke-width="1"/>
    <line x1="48"  y1="1" x2="48"  y2="10" stroke="#3e4230" stroke-width="1"/>

    <!-- Minor ticks every 8px (= 2.5 mm) -->
    <line x1="-40" y1="1" x2="-40" y2="7" stroke="#3e4230" stroke-width="0.7"/>
    <line x1="-24" y1="1" x2="-24" y2="7" stroke="#3e4230" stroke-width="0.7"/>
    <line x1="-8"  y1="1" x2="-8"  y2="7" stroke="#3e4230" stroke-width="0.7"/>
    <line x1="8"   y1="1" x2="8"   y2="7" stroke="#3e4230" stroke-width="0.7"/>
    <line x1="24"  y1="1" x2="24"  y2="7" stroke="#3e4230" stroke-width="0.7"/>
    <line x1="40"  y1="1" x2="40"  y2="7" stroke="#3e4230" stroke-width="0.7"/>

    <!-- Ruler numbers (mm) -->
    <text x="-48" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#46473f">0</text>
    <text x="-32" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#46473f">5</text>
    <text x="-16" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#46473f">10</text>
    <text x="0"   y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#46473f">15</text>
    <text x="16"  y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#46473f">20</text>
    <text x="32"  y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#46473f">25</text>
    <text x="48"  y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#46473f">30</text>
  </g>

  <text x="550" y="264" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="9" font-weight="700"
    letter-spacing="2.5" fill="#5c6149">STEP THREE</text>
  <text x="550" y="280" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="10.5" fill="#46473f"
    >Measure the marks on the</text>
  <text x="550" y="294" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="10.5" fill="#46473f"
    >tape in millimetres (mm)</text>
  <text x="550" y="315" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="12" font-weight="600"
    fill="#282c1b"># 3</text>


  <!-- ═══════════════════════════════════════════════════════════
       STEP 4  –  cx=770, cy=178
       ═══════════════════════════════════════════════════════════ -->
  <circle cx="770" cy="178" r="68" fill="#dee3c4"/>
  <g transform="translate(770,178)">

    <!-- Notecard shadow -->
    <rect x="-39" y="-33" width="68" height="57" rx="4"
          fill="rgba(60,66,48,0.10)"/>
    <!-- Notecard body -->
    <rect x="-41" y="-35" width="68" height="57" rx="4"
          fill="#ffffff" stroke="#3e4230" stroke-width="1.5"/>

    <!-- Card label -->
    <text x="-7" y="-22" text-anchor="middle"
      font-family="Arial, sans-serif" font-size="8" fill="#5c6149"
      >Record the size of</text>
    <text x="-7" y="-12" text-anchor="middle"
      font-family="Arial, sans-serif" font-size="8" fill="#5c6149"
      >your each nails</text>

    <!-- Divider -->
    <line x1="-38" y1="-5" x2="24" y2="-5"
          stroke="#c7c7bc" stroke-width="0.8"/>

    <!-- Measurement values -->
    <text x="-7" y="10" text-anchor="middle"
      font-family="Georgia, serif" font-size="11.5" font-weight="500"
      fill="#282c1b">16 / 12 / 13 / 12 / 9</text>

    <!-- Brand badge (bottom-right of card) -->
    <circle cx="22" cy="16" r="9.5" fill="#3e4230"/>
    <text x="22" y="20" text-anchor="middle"
      font-family="Georgia, serif" font-size="7.5"
      fill="#dee3c4">AB</text>
  </g>

  <text x="770" y="264" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="9" font-weight="700"
    letter-spacing="2.5" fill="#5c6149">STEP FOUR</text>
  <text x="770" y="280" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="10.5" fill="#46473f"
    >Record the size of your</text>
  <text x="770" y="294" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="10.5" fill="#46473f"
    >each nails</text>
  <text x="770" y="315" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="12" font-weight="600"
    fill="#282c1b"># 4</text>

</svg>
